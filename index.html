<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💙 33 日本動物園 訂單統整</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --main-blue: #003399; 
            --bg-blue-light: #f0f4fa; 
            --accent-blue: #0047bb; 
            --price-red: #d9534f; 
            --main-brown: #003399; 
        }
        body { font-family: sans-serif; background: var(--bg-blue-light); margin: 0; display: flex; flex-direction: column; height: 100vh; color: #333; overflow: hidden; }
        header { background: var(--main-blue); color: white; padding: 12px; text-align: center; font-size: 1.3em; font-weight: bold; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-bar { background: #dee7f2; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 2px solid #bbc9dd; flex-shrink: 0; align-items: center; }
        .nav-btn { background: white; border: 1px solid #bbc9dd; padding: 8px 18px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 1.1em; color: var(--main-blue); font-weight: bold; }
        .sync-btn { background: #ff9800; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-left: auto; }
        .main-content { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .item-area { flex: 1.8; overflow-y: auto; background: white; border-radius: 15px; padding: 15px; border: 2px solid #dee7f2; }
        .cat-title { background: #eef2f9; padding: 8px 15px; border-radius: 20px; margin: 15px 0 8px; font-weight: bold; border-left: 8px solid var(--main-blue); font-size: 1.2em; color: var(--main-blue); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; }
        .p-btn { background: white; border: 1px solid #e1e8f0; border-radius: 12px; padding: 10px 5px; text-align: center; cursor: pointer; box-shadow: 2px 2px 0 #dee7f2; min-height: 90px; display: flex; flex-direction: column; justify-content: center; }
        .p-name { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; height: 2.8em; overflow: hidden; line-height: 1.4; }
        .p-price { color: var(--accent-blue); font-size: 1.2em; font-weight: bold; }
        .p-stock { font-size: 0.8em; color: #777; }
        .checkout-area { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 320px; overflow-y: auto; }
        .card { background: white; border-radius: 15px; padding: 12px; border: 2px solid #dee7f2; }
        #cart-list { max-height: 200px; overflow-y: auto; border-bottom: 2px dashed #dee7f2; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; font-size: 1.1em; border-bottom: 1px solid #eee; }
        .big-input { font-size: 1.8em; padding: 12px; width: 100%; border-radius: 10px; border: 2px solid #bbc9dd; text-align: right; box-sizing: border-box; background: #fafdff; font-weight: bold; color: var(--main-blue); }
        .small-note { font-size: 1em; padding: 10px; width: 100%; border-radius: 8px; border: 1.5px solid #003399; box-sizing: border-box; margin-top: 5px; background: #fffdf0; }
        .total-display { font-size: 3.2em; font-weight: bold; color: var(--price-red); text-align: right; margin: 10px 0; }
        .pay-btn { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; font-size: 1.3em;}
        .pay-btn.active { background: var(--main-blue); color: white; border-color: var(--main-blue); }
        #admin-panel, #history-panel, #user-search-panel { position: fixed; inset: 10px; background: white; z-index: 1000; border-radius: 20px; display: none; flex-direction: column; padding: 15px; border: 3px solid var(--main-blue); box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        .admin-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; flex: 1; overflow: hidden; }
        .add-row-top { background: #f0f4fa; padding: 15px; border: 2px solid var(--main-blue); border-radius: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .admin-table-container { overflow: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f4f4f4; position: sticky; top: 0; padding: 10px; border: 1px solid #ddd; z-index: 5; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .del-x { color: red; font-weight: bold; cursor: pointer; font-size: 1.4em; }
        .order-tag { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 4px; color: #666; display: inline-block; margin-top: 4px; border: 1px solid #ddd; }
        .history-card { background: #fdfdfd; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .history-del-btn { position: absolute; top: 10px; right: 10px; color: red; cursor: pointer; font-weight: bold; border: 1px solid red; padding: 2px 5px; border-radius: 4px; font-size: 0.8em; }
        .clear-log-btn { background: none; border: 1px solid var(--main-blue); color: var(--main-blue); font-size: 0.75em; padding: 2px 8px; border-radius: 5px; cursor: pointer; }
        .admin-only { display: none; } /* 用來隱藏老闆專用按鈕 */
        .summary-box { background: #eef2f9; padding: 10px; border-radius: 10px; border: 1px solid var(--main-blue); margin-top: 10px; }
    </style>
</head>
<body>

<header>💙 33 日本動物園 訂單統整</header>
<div class="nav-bar">
    <div id="navbar" style="display:flex; gap:10px;"></div>
    <button class="sync-btn admin-only" id="sync-btn-ui" onclick="syncOfflineData()">🔄 離線同步</button>
</div>

<div class="main-content">
    <div class="item-area" id="item-area">讀取資料中...</div>
    <div class="checkout-area">
        <div class="card">
            <strong>📋 登記名單</strong>
            <div id="cart-list"></div>
            <div style="margin-top:10px;">
                <input type="number" id="discount" class="big-input" placeholder="運費" oninput="calc()">
                <input type="text" id="discount-note" class="small-note" placeholder="✏️ 輸入你的暱稱 (必填)">
                <div class="total-display" id="total-price">$ 0</div>
            </div>
            <button class="pay-btn active" style="width:100%; margin-top:10px; background:var(--main-blue);" onclick="checkout()">✅ 確認登記 (私訊/轉帳)</button>
            <button class="pay-btn" style="width:100%; margin-top:5px; font-size:0.9em; color:#999;" onclick="clearCart()">清空重選</button>
            <div style="margin-top:10px; display:flex; justify-content: space-between; gap:5px;">
                <button onclick="togglePanel('user-search-panel')" style="flex:1; background:#fff; border:1.5px solid var(--main-blue); border-radius:8px; color:var(--main-blue); padding:8px;">🔍 查詢我的登記</button>
                <button onclick="togglePanel('admin-panel')" class="admin-only" id="admin-btn-ui" style="background:none; border:1px solid #ccc; border-radius:5px; color:#999;">⚙️ 品項設定</button>
                <button onclick="togglePanel('history-panel')" class="admin-only" id="history-btn-ui" style="background:none; border:1px solid #ccc; border-radius:5px; color:#999;">📜 總清單</button>
            </div>
        </div>
    </div>
</div>

<div id="user-search-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; color:var(--main-blue);">🔍 查詢我的登記內容</h2>
